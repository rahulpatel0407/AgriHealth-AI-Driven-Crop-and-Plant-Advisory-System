name: CI Build

on:
  push:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build backend image
        run: docker build -t agrihealth-backend:ci -f backend/Dockerfile .
      - name: Build frontend image
        run: docker build -t agrihealth-frontend:ci -f frontend/Dockerfile .
